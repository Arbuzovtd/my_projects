services:
  trading-bot:
    build: .
    container_name: trading-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # We mount only persistent data files. 
      # Code is already inside the image thanks to COPY . . in Dockerfile.
      - ./config.json:/app/config.json
      - ./config.db:/app/config.db
      - ./bot.log:/app/bot.log
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
