services:
  trading-bot:
    image: timurarbuzov/trading-bot:latest
    container_name: trading-bot
    restart: unless-stopped
    env_file:
      - .env
    # Бот доступен только внутри сети Docker для Caddy
    expose:
      - "8000"
    volumes:
      - ./config.json:/app/config.json
      - ./config.db:/app/config.db
      - ./bot.log:/app/bot.log
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
